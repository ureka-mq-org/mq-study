name: PR Review Slack Notification

on:
  pull_request_review:
    types: [submitted]

jobs:
  slack_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "📢 *코드 리뷰 결과 알림*",
              "attachments": [
                {
                  "color": "${{ github.event.review.state == 'approved' && '#36a64f' || (github.event.review.state == 'changes_requested' && '#ec4141' || '#dbdbdb') }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*${{ github.event.review.user.login }}* 님이 리뷰를 남겼습니다.\n\n*결과:* ${{ github.event.review.state == 'approved' && '✅ 승인 (Approved)' || (github.event.review.state == 'changes_requested' && '❌ 변경 요청 (Changes Requested)' || '💬 코멘트 (Commented)') }}\n*PR 제목:* ${{ github.event.pull_request.title }}\n*링크:* <${{ github.event.review.html_url }}|리뷰 확인하기>"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK